site_name: Cannoli
docs_dir: docs
site_url: https://cannoli.dev/
site_description: Cannoli_OS Documentation
theme:
  name: material
  custom_dir: overrides/
  logo: resources/img/logo.png
  favicon: resources/img/logo.png
  language: en
  palette:
    scheme: slate
  font: false
  features:
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - tables

nav:
  - Introduction: documentation/index.md
  - Features: documentation/features.md
  - Getting Started: documentation/getting-started.md
  - Directory Structure: documentation/directory-structure.md
  - Platforms: documentation/platforms.md
  - RomM Integration: documentation/romm.md
  - Button Reference: documentation/button-reference.md
  - FAQ: documentation/faq.md

copyright: "&copy; 2026 Cannoli"

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CannoliHQ/cannoli
    - icon: fontawesome/brands/discord
      link: https://discord.gg/QKTjTQ796q

extra_css:
  - resources/css/theme.css

watch:
  - docs
  - mkdocs.yml
  - overrides
