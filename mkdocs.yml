site_name: Cannoli
docs_dir: docs
site_url: https://cannoli.dev/
site_description: Cannoli_OS Documentation
repo_url: https://github.com/CannoliHQ/cannoli
repo_name: CannoliHQ/cannoli
theme:
  name: material
  custom_dir: overrides/
  logo: resources/img/logo.png
  favicon: resources/img/logo.png
  language: en
  palette:
    scheme: slate
  font: false
  icon:
    repo: fontawesome/brands/github
  features:
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search
  - glightbox:
      auto_caption: false
      touchNavigation: true
      effect: fade
      manual: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - tables

nav:
  - Introduction: documentation/index.md
  - Features: documentation/features.md
  - Getting Started: documentation/getting-started.md
  - User Guide:
    - Library: documentation/library.md
    - Playing Games: documentation/playing-games.md
    - Customization: documentation/customization.md
    - Settings: documentation/settings.md
    - Nonna's Kitchen: documentation/nonnas-kitchen.md
  - Integrations:
    - RetroArch: documentation/retroarch.md
    - RicottaArch: documentation/ricotta.md
    - RetroAchievements: documentation/retroachievements.md
    - RomM: documentation/romm.md
  - Reference:
    - Platforms: documentation/platforms.md
    - Directory Structure: documentation/directory-structure.md
    - Button Reference: documentation/button-reference.md
    - Changelog: documentation/changelog.md
  - FAQ: documentation/faq.md
  - License: documentation/license.md
  - Credits: documentation/credits.md

copyright: "&copy; 2026 Cannoli"

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CannoliHQ/cannoli
    - icon: fontawesome/brands/discord
      link: https://discord.gg/QKTjTQ796q

extra_css:
  - resources/css/theme.css

watch:
  - docs
  - mkdocs.yml
  - overrides
