<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 440" fill="none">
  <defs>
    <mask id="screen-cutout">
      <rect width="320" height="440" fill="white"/>
      <rect x="38" y="28" width="244" height="214" rx="6" ry="6" fill="black"/>
    </mask>
    <linearGradient id="glare" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g mask="url(#screen-cutout)">
    <!-- Device body -->
    <rect x="10" y="10" width="300" height="420" rx="24" ry="24" fill="#1a8a8a" stroke="#15706f" stroke-width="2"/>

    <!-- Inner bevel -->
    <rect x="18" y="18" width="284" height="404" rx="18" ry="18" fill="#178080" stroke="#14706f" stroke-width="1"/>

    <!-- Screen bezel -->
    <rect x="30" y="20" width="260" height="230" rx="10" ry="10" fill="#1a1a1e"/>
  </g>

  <!-- Screen glass reflection -->
  <rect x="38" y="28" width="244" height="214" rx="6" ry="6" fill="url(#glare)" opacity="0.04"/>

  <!-- D-Pad -->
  <g transform="translate(95, 310)">
    <circle cx="0" cy="0" r="36" fill="#147070" stroke="#14706f" stroke-width="1"/>
    <rect x="-28" y="-10" width="56" height="20" rx="3" ry="3" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="0.5"/>
    <rect x="-10" y="-28" width="20" height="56" rx="3" ry="3" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="5" fill="#147070"/>
  </g>

  <!-- Face buttons -->
  <g transform="translate(225, 310)">
    <circle cx="0" cy="-24" r="13" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="0.5"/>
    <text x="0" y="-20" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555" font-weight="600">Y</text>
    <circle cx="24" cy="0" r="13" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="0.5"/>
    <text x="24" y="4" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555" font-weight="600">A</text>
    <circle cx="0" cy="24" r="13" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="0.5"/>
    <text x="0" y="28" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555" font-weight="600">B</text>
    <circle cx="-24" cy="0" r="13" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="0.5"/>
    <text x="-24" y="4" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555" font-weight="600">X</text>
  </g>

  <!-- Left speaker grille -->
  <g transform="translate(70, 390)">
    <circle cx="-12" cy="-6" r="1.5" fill="#147070"/>
    <circle cx="-4" cy="-6" r="1.5" fill="#147070"/>
    <circle cx="4" cy="-6" r="1.5" fill="#147070"/>
    <circle cx="12" cy="-6" r="1.5" fill="#147070"/>
    <circle cx="-12" cy="0" r="1.5" fill="#147070"/>
    <circle cx="-4" cy="0" r="1.5" fill="#147070"/>
    <circle cx="4" cy="0" r="1.5" fill="#147070"/>
    <circle cx="12" cy="0" r="1.5" fill="#147070"/>
    <circle cx="-12" cy="6" r="1.5" fill="#147070"/>
    <circle cx="-4" cy="6" r="1.5" fill="#147070"/>
    <circle cx="4" cy="6" r="1.5" fill="#147070"/>
    <circle cx="12" cy="6" r="1.5" fill="#147070"/>
    <circle cx="-12" cy="12" r="1.5" fill="#147070"/>
    <circle cx="-4" cy="12" r="1.5" fill="#147070"/>
    <circle cx="4" cy="12" r="1.5" fill="#147070"/>
    <circle cx="12" cy="12" r="1.5" fill="#147070"/>
  </g>

  <!-- Select button -->
  <rect x="125" y="388" width="26" height="10" rx="5" ry="5" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="0.5"/>
  <!-- Start button -->
  <rect x="169" y="388" width="26" height="10" rx="5" ry="5" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="0.5"/>

  <!-- Select/Start labels -->
  <text x="138" y="411" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#555" letter-spacing="1">SELECT</text>
  <text x="182" y="411" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#555" letter-spacing="1">START</text>

  <!-- Right speaker grille -->
  <g transform="translate(250, 390)">
    <circle cx="-12" cy="-6" r="1.5" fill="#147070"/>
    <circle cx="-4" cy="-6" r="1.5" fill="#147070"/>
    <circle cx="4" cy="-6" r="1.5" fill="#147070"/>
    <circle cx="12" cy="-6" r="1.5" fill="#147070"/>
    <circle cx="-12" cy="0" r="1.5" fill="#147070"/>
    <circle cx="-4" cy="0" r="1.5" fill="#147070"/>
    <circle cx="4" cy="0" r="1.5" fill="#147070"/>
    <circle cx="12" cy="0" r="1.5" fill="#147070"/>
    <circle cx="-12" cy="6" r="1.5" fill="#147070"/>
    <circle cx="-4" cy="6" r="1.5" fill="#147070"/>
    <circle cx="4" cy="6" r="1.5" fill="#147070"/>
    <circle cx="12" cy="6" r="1.5" fill="#147070"/>
    <circle cx="-12" cy="12" r="1.5" fill="#147070"/>
    <circle cx="-4" cy="12" r="1.5" fill="#147070"/>
    <circle cx="4" cy="12" r="1.5" fill="#147070"/>
    <circle cx="12" cy="12" r="1.5" fill="#147070"/>
  </g>


</svg>
